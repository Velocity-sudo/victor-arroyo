name: Deploy to GitHub Pages

on:
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare deploy folder
        run: |
          mkdir -p _site
          # Copy only web-deployable files
          cp -f *.html _site/ 2>/dev/null || true
          cp -f .nojekyll _site/ 2>/dev/null || true
          cp -rf brand-assets/ _site/brand-assets/ 2>/dev/null || true
          cp -rf 02_funnel_ghl/ _site/02_funnel_ghl/ 2>/dev/null || true
          cp -rf 05_deploy/ _site/05_deploy/ 2>/dev/null || true
          cp -rf Diseño/ _site/Diseño/ 2>/dev/null || true
          echo "Files to deploy:"
          find _site -type f | head -50

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
